<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale · Damage vs HP</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1600px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }
        .header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        #chart {
            width: 100%;
            height: 82vh; 
            border-radius: 16px;
            background: #ffffff;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1> 皇室战争：伤害🗡️vs 血量🛡️</h1>
    </div>
    <div id="chart"></div>
</div>

<script>
    const chartDom = document.getElementById('chart');
    const myChart = echarts.init(chartDom);

    let parsedData = {
        troops: [],
        spells: [],
        maxHP: 0,
        maxDMG: 0
    };

    myChart.showLoading({
        text: '正在加载卡牌数据...',
        color: '#0984e3',
        textColor: '#2c3e50',
        maskColor: 'rgba(255, 255, 255, 0.8)',
        zlevel: 0
    });

    fetch('data.json?t=' + new Date().getTime())
        .then(response => {
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return response.json();
        })
        .then(rawData => {
            const dataMap = new Map();

            rawData.forEach(item => {
                const ref = item.ref_cards[0] || {};
                const baseName = ref.name_zh || item.name;
                let comment = ref.comment_zh || ref.comment_jp || ''; 
                
                if (comment === 'ボーイ') comment = '小哥';
                if (comment === '炮台伤害' || comment === '炮台血量') comment = '炮台';
                if (comment === '复仇哥布林') comment = '硬汉'; 

                if (!baseName) return; 

                let rawImg = ref.img || '';
                let rootImg = rawImg ? rawImg.replace(/-ev\.png$/, '.png').replace(/-hero\.png$/, '.png') : '';

                const uniqueKey = baseName + '_' + comment; 

                if (!dataMap.has(uniqueKey)) {
                    dataMap.set(uniqueKey, {
                        id: uniqueKey,
                        baseName: baseName, 
                        comment: comment,
                        img: rawImg,         
                        rootImg: rootImg,    
                        hp: 0,
                        damage: 0,
                        nativeHp: 0,      
                        nativeDamage: 0,  
                        ref: ref
                    });
                }
                const obj = dataMap.get(uniqueKey);
                
                if (item.type === 'hp') {
                    obj.hp = Math.max(obj.hp, item.value);
                    obj.nativeHp = obj.hp;
                }
                if (item.type === 'damage') {
                    obj.damage = Math.max(obj.damage, item.value);
                    obj.nativeDamage = obj.damage;
                }
            });

            dataMap.forEach(obj => {
                if (obj.hp === 0 || obj.damage === 0) {
                    const tryInherit = (peer) => {
                        if (obj.hp === 0 && peer.hp > 0) obj.hp = peer.hp;
                        if (obj.damage === 0 && peer.damage > 0) obj.damage = peer.damage;
                    };
                    const isSameFamily = (peer) => {
                        if (obj.rootImg && peer.rootImg) return obj.rootImg === peer.rootImg;
                        return obj.baseName === peer.baseName; 
                    };

                    if (obj.hp === 0 || obj.damage === 0) {
                        dataMap.forEach(peer => {
                            if (peer.baseName === obj.baseName && peer.comment !== '' && obj.comment !== '') {
                                if (obj.comment.includes(peer.comment) || peer.comment.includes(obj.comment)) tryInherit(peer);
                            }
                        });
                    }

                    if (obj.hp === 0 || obj.damage === 0) {
                        dataMap.forEach(peer => {
                            if (peer.img === obj.rootImg && peer.comment === '') tryInherit(peer);
                        });
                    }

                    if ((obj.hp === 0 || obj.damage === 0) && obj.comment !== '') {
                        if (obj.hp === 0) {
                            let maxHp = 0;
                            dataMap.forEach(peer => { if (peer.baseName === obj.baseName && peer.hp > maxHp) maxHp = peer.hp; });
                            obj.hp = maxHp;
                        }
                        if (obj.damage === 0) {
                            let maxDmg = 0;
                            dataMap.forEach(peer => { if (peer.baseName === obj.baseName && peer.damage > maxDmg) maxDmg = peer.damage; });
                            obj.damage = maxDmg;
                        }
                    }
                }
            });

            const keysToDelete = [];
            dataMap.forEach((obj, key) => {
                if (obj.comment === '') {
                    let isRedundant = false;
                    dataMap.forEach(peer => {
                        if (peer.img === obj.img && peer.comment !== '' && peer !== obj) {
                            if ((obj.nativeHp === 0 || obj.nativeDamage === 0) && peer.hp === obj.hp && peer.damage === obj.damage) {
                                isRedundant = true; 
                            }
                        }
                        if (obj.damage === 0 && obj.hp > 0 && peer.img === obj.img && peer.hp === obj.hp && peer.damage > 0) {
                            isRedundant = true;
                        }
                    });
                    if (isRedundant) keysToDelete.push(key);
                }
            });
            keysToDelete.forEach(key => dataMap.delete(key));

            const groupedPoints = {};
            dataMap.forEach(obj => {
                const key = `${obj.hp}_${obj.damage}`;
                if (!groupedPoints[key]) {
                    groupedPoints[key] = [];
                }
                groupedPoints[key].push(obj);
            });

            Object.values(groupedPoints).forEach(group => {
                const pointCount = group.length;

                group.forEach((obj, index) => {
                    if (obj.hp < 9000 && obj.hp > parsedData.maxHP) parsedData.maxHP = obj.hp;
                    if (obj.damage < 9000 && obj.damage > parsedData.maxDMG) parsedData.maxDMG = obj.damage;

                    let iconFile = obj.img || '';
                    if (iconFile) {
                        iconFile = iconFile.replace(/(.+)-ev\.png$/, 'evolved-$1.png');
                        iconFile = iconFile.replace(/(.+)-hero\.png$/, 'hero-$1.png');
                    }

                    let offsetX = 0;
                    let offsetY = 0;
                    if (pointCount === 2) {
                        offsetX = index === 0 ? -16 : 16;
                    } else if (pointCount > 2) {
                        const radius = 12 + pointCount * 2.5; 
                        const angle = (index * 2 * Math.PI / pointCount) - (Math.PI / 2);
                        offsetX = Math.cos(angle) * radius;
                        offsetY = Math.sin(angle) * radius;
                    }

                    const point = {
                        name: obj.baseName,          
                        comment: obj.comment,      
                        value: [obj.hp, obj.damage],
                        img: iconFile,
                        symbol: iconFile ? `image://icon/${iconFile}` : 'circle',
                        symbolSize: 26, 
                        symbolOffset: [offsetX, offsetY]
                    };

                    if (obj.hp > 0) {
                        parsedData.troops.push(point);
                    } else {
                        parsedData.spells.push(point);
                    }
                });
            });

            myChart.hideLoading();
            renderChartSmart1to1(); 
        })
        .catch(error => {
            console.error('获取 data.json 失败:', error);
            myChart.hideLoading();
            alert('无法加载数据，请确保 data.json 文件存在。');
        });

    function renderChartSmart1to1() {
        if (parsedData.maxHP === 0) return;

        const xMax = Math.ceil(parsedData.maxHP / 500) * 500 + 500; 
        const yMax = Math.ceil(parsedData.maxDMG / 500) * 500 + 200; 

        const option = {
            tooltip: {
                padding: 12,
                backgroundColor: 'rgba(255, 255, 255, 0.95)',
                borderColor: '#dfe6e9',
                borderWidth: 1,
                textStyle: { color: '#2d3436' },
                formatter: function (params) {
                    if(params.seriesId === 'dynamic-highlight') return '';

                    const d = params.data;
                    const imgUrl = d.img ? `icon/${d.img}` : '';
                    const imgHtml = imgUrl ? `<img src="${imgUrl}" style="width:50px;height:50px;object-fit:cover;border-radius:10px;background:#f1f2f6;border:1px solid #ddd;">` : '';
                    
                    const commentHtml = d.comment 
                        ? `<div style="font-size:12px; color:#e17055; font-weight:bold; margin-bottom:8px;">[ ${d.comment} ]</div>` 
                        : `<div style="margin-bottom:8px;"></div>`;
                    
                    return `
                        <div style="display:flex; align-items:center; gap: 14px; min-width: 180px;">
                            ${imgHtml}
                            <div>
                                <div style="font-weight:bold; font-size:16px; margin-bottom:2px; color:#2d3436;">${d.name}</div>
                                ${commentHtml}
                                <div style="font-size:13px;">
                                    HP : <span style="color:#e74c3c; font-weight:bold; font-size:14px;">${d.value[0]}</span><br>
                                    DMG: <span style="color:#0984e3; font-weight:bold; font-size:14px;">${d.value[1]}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            },
            legend: {
                data: ['部队/建筑 (HP > 0)', '法术/特效 (HP = 0)'],
                right: '4%', 
                top: '10%', 
                orient: 'vertical',
                backgroundColor: 'rgba(255, 255, 255, 0.85)', 
                borderColor: '#dfe6e9',
                borderWidth: 1,
                padding: 12,
                borderRadius: 8,
                textStyle: { fontSize: 13, fontWeight: 'bold' },
                zlevel: 10
            },
            grid: {
                left: '3%',
                right: '3%',
                top: '3%',
                bottom: '5%',
                containLabel: true 
            },
            xAxis: [
                {
                    type: 'value',
                    name: '血量 (Hitpoints)',
                    nameLocation: 'middle',
                    nameGap: 30, 
                    min: 0,
                    max: xMax,
                    interval: 500,
                    nameTextStyle: { fontSize: 14, fontWeight: 'bold' },
                    splitLine: { show: true, lineStyle: { type: 'dashed', color: '#ecf0f1' } },
                    axisLine: { lineStyle: { color: '#bdc3c7' } }
                },
                {
                    type: 'value',
                    min: 0,
                    max: xMax,
                    show: false 
                }
            ],
            yAxis: {
                type: 'value',
                name: '伤害 (Damage)',
                nameLocation: 'middle',
                nameGap: 45,
                min: 0,
                max: yMax,
                interval: 500,
                nameTextStyle: { fontSize: 14, fontWeight: 'bold' },
                splitLine: { show: true, lineStyle: { type: 'dashed', color: '#ecf0f1' } },
                axisLine: { lineStyle: { color: '#bdc3c7' }, onZero: false } 
            },
            dataZoom: [
                { type: 'inside', xAxisIndex: 0 },
                { type: 'inside', yAxisIndex: 0 },
                { 
                    type: 'slider', 
                    xAxisIndex: 0, 
                    top: 8, 
                    height: 12,             
                    showDataShadow: false,
                    borderColor: 'transparent',
                    backgroundColor: 'rgba(236, 240, 241, 0.4)',
                    fillerColor: 'rgba(9, 132, 227, 0.15)',
                    handleSize: '120%'
                },
                { 
                    type: 'slider', 
                    yAxisIndex: 0, 
                    right: 8, 
                    width: 12,              
                    showDataShadow: false,
                    borderColor: 'transparent',
                    backgroundColor: 'rgba(236, 240, 241, 0.4)',
                    fillerColor: 'rgba(9, 132, 227, 0.15)',
                    handleSize: '120%'
                }
            ],
            series: [
                {
                    id: 'troops-series',
                    name: '部队/建筑 (HP > 0)',
                    type: 'scatter',
                    xAxisIndex: 0, 
                    data: parsedData.troops,
                    itemStyle: { color: '#0984e3', opacity: 0.9 }, 
                    emphasis: { focus: 'none', scale: true }
                },
                {
                    id: 'spells-series',
                    name: '法术/特效 (HP = 0)',
                    type: 'scatter',
                    xAxisIndex: 1, 
                    data: parsedData.spells,
                    itemStyle: { color: '#e74c3c', opacity: 0.9 },
                    emphasis: { focus: 'none', scale: true }
                },
                {
                    id: 'dynamic-highlight',
                    type: 'scatter',
                    silent: true, 
                    z: 1, 
                    data: [],
                    markArea: { animation: false, data: [] },
                    markLine: { animation: false, data: [] }
                }
            ]
        };

        myChart.setOption(option, true);
    }

    myChart.on('mouseover', function(params) {
        if (params.seriesType === 'scatter' && params.seriesId !== 'dynamic-highlight') {
            const x = params.value[0]; // 当前悬停卡牌的 血量
            const y = params.value[1]; // 当前悬停卡牌的 伤害值
            const highlightColor = params.seriesIndex === 0 ? '#0984e3' : '#e74c3c';
            const currentXAxisIndex = params.seriesIndex === 0 ? 0 : 1;

            // ✨ 双向雷达 1：计算部队（哪些部队能抗住当前伤害？）
            const dynamicTroops = parsedData.troops.map(t => {
                const isHoveredItem = (t.name === params.data.name && t.comment === params.data.comment);
                // 逻辑：如果部队血量 > 悬停卡牌伤害（即杀不死），则变淡隐藏！
                // 留下的高亮卡牌，都是能被当前伤害秒杀的脆皮。
                if (!isHoveredItem && t.value[0] > y) {
                    return { ...t, itemStyle: { color: '#0984e3', opacity: 0.15 } };
                }
                return { ...t, itemStyle: { color: '#0984e3', opacity: 0.9 } };
            });

            // ✨ 双向雷达 2：计算法术（哪些法术能秒杀当前部队？）
            const dynamicSpells = parsedData.spells.map(s => {
                const isHoveredItem = (s.name === params.data.name && s.comment === params.data.comment);
                // 逻辑：如果法术的伤害 < 悬停卡牌的血量（即法术杀不死它），法术变淡隐藏！
                // 留在原位高亮的法术，都是能直接秒杀当前指向部队的法术。
                if (!isHoveredItem && s.value[1] < x) {
                    return { ...s, itemStyle: { color: '#e74c3c', opacity: 0.15 } };
                }
                return { ...s, itemStyle: { color: '#e74c3c', opacity: 0.9 } };
            });

            myChart.setOption({
                series: [
                    {
                        id: 'troops-series',
                        data: dynamicTroops
                    },
                    {
                        id: 'spells-series',
                        data: dynamicSpells // 注入动态法术列
                    },
                    {
                        id: 'dynamic-highlight',
                        xAxisIndex: currentXAxisIndex,
                        markArea: {
                            itemStyle: { color: highlightColor, opacity: 0.15 },
                            data: [
                                [ { coord: [0, 0] }, { coord: [x, y] } ]
                            ]
                        },
                        markLine: {
                            lineStyle: { color: highlightColor, width: 2, type: 'dashed' },
                            symbol: ['none', 'none'],
                            data: [
                                [ { coord: [x, 0] }, { coord: [x, y] } ],
                                [ { coord: [0, y] }, { coord: [x, y] } ]
                            ]
                        }
                    }
                ]
            });
        }
    });

    // 移出时，部队和法术同时恢复全图高亮
    myChart.on('mouseout', function(params) {
        if (params.seriesType === 'scatter' && params.seriesId !== 'dynamic-highlight') {
            myChart.setOption({
                series: [
                    {
                        id: 'troops-series',
                        data: parsedData.troops
                    },
                    {
                        id: 'spells-series',
                        data: parsedData.spells // 恢复法术列
                    },
                    {
                        id: 'dynamic-highlight',
                        markArea: { data: [] },
                        markLine: { data: [] }
                    }
                ]
            });
        }
    });

    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            myChart.resize();
            renderChartSmart1to1(); 
        }, 100);
    });
</script>

</body>
</html>
